        username_required: "ユーザー名は必須です"
        username_too_short: "ユーザー名は{{ limit }}文字以上である必要があります"
        username_too_long: "ユーザー名は{{ limit }}文字以下である必要があります"
        username_invalid_format: "ユーザー名には文字、数字、アンダースコア、ハイフンのみ使用できます"
        email_required: "メールは必須です"
        email_invalid: "有効なメールアドレスを入力してください"
    message:
      success: "個人情報が正常に更新されました"
      error: "情報の更新中にエラーが発生しました"

  picture:
    title: "プロフィール画像"
    description: "このセクションではプロフィール画像/アバターをアップロード・更新できます。"
    current_avatar: "現在のアバター"
    form:
      avatar:
        label: "画像を選択"
      help: "使用可能な形式：PNG、JPEG。最大サイズ：2 MB。画像は100x100ピクセルにリサイズされます。"
      submit: "アップロード"
      error:
        file_required: "画像を選択してください。"
        mime_type: "PNGおよびJPEG画像のみ使用できます。"
        max_size: "ファイルが大きすぎます。最大サイズ：{{ limit }}。"
    message:
      success: "プロフィール画像が正常に更新されました"
      error: "画像のアップロード中にエラーが発生しました"

  player:
    title: "プレイヤープロフィール"
    description: "このセクションではプレイヤーの統計、実績、ゲーム活動が表示されます。"
