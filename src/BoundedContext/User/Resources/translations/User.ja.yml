      username:
        label: "ユーザー名"
        placeholder: "ユーザー名を入力"
      email:
        label: "メールアドレス"
        placeholder: "メールを入力"
      language:
        label: "言語"
        placeholder: "言語を選択"
      timezone:
        label: "タイムゾーン"
        placeholder: "タイムゾーンを選択"
      submit: "変更を保存"
