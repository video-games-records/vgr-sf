# === LOGIN ===
login:
  title: "ログイン"
  subtitle: "アカウントにサインイン"

  form:
    username_or_email:
      label: "メールまたはユーザー名"
      placeholder: "メールまたはユーザー名を入力"
    password:
      label: "パスワード"
      placeholder: "パスワードを入力"
    submit: "ログイン"

  flash:
    success: "ログインしました。おかえりなさい！"
    error: "ログインに失敗しました。認証情報を確認してください。"

  link:
    no_account: "アカウントをお持ちでないですか？"
    register: "サインアップ"
    forgot_password: "パスワードをお忘れですか？"

# === REGISTRATION ===
registration:
  title: "アカウント作成"
  subtitle: "コミュニティに参加するために登録する"

  form:
    email:
      label: "メール"
      placeholder: "メールアドレスを入力"
    username:
      label: "ユーザー名"
      placeholder: "magicbart"
    password:
      label: "パスワード"
      placeholder: "••••••••••••••••"
    confirm_password:
      label: "パスワードの確認"
      placeholder: "パスワードを確認"
    submit: "アカウント作成"

  error:
    email_required: "メールは必須です"
    email_invalid: "有効なメールアドレスを入力してください"
    username_required: "ユーザー名は必須です"
    username_too_short: "ユーザー名は{{ limit }}文字以上である必要があります"
    username_too_long: "ユーザー名は{{ limit }}文字以下である必要があります"
    username_invalid_format: "ユーザー名には文字、数字、アンダースコア、ハイフンのみ使用できます"
    password_required: "パスワードは必須です"
    password_too_short: "パスワードは{{ limit }}文字以上である必要があります"
    password_invalid_format: "パスワードには少なくとも1文字と1数字を含める必要があります"
    password_mismatch: "パスワードフィールドが一致している必要があります"

  flash:
    success: "アカウントが正常に作成されました！Video Games Recordsへようこそ！"
    error: "登録中にエラーが発生しました。もう一度お試しください。"

  link:
    have_account: "すでにアカウントをお持ちですか？"
    login: "ログイン"

# === RESET PASSWORD ===
reset_password:
  request:
    title: "パスワードのリセット"
    subtitle: "メールアドレスを入力してください。パスワードリセットのリンクをお送りします"
    help: "パスワードをリセットするための手順をメールでお送りします"
    submit: "リセットリンクを送信"
    back_to_login: "ログインに戻る"

  confirm:
    title: "新しいパスワードの作成"
    subtitle: "新しいパスワードを入力してください"
    help: "パスワードは6文字以上である必要があります"
    submit: "パスワードをリセット"
    back_to_login: "ログインに戻る"

  flash:
    request_success: "そのメールのアカウントが存在する場合、パスワードリセットリンクがまもなく届きます。"
    request_error: "リクエストの処理中にエラーが発生しました。もう一度お試しください。"
    invalid_token: "無効または期限切れのリセットトークンです。パスワードリセットを再度リクエストしてください。"
    expired_token: "パスワードリセットリンクの有効期限が切れています。新しいリンクをリクエストしてください。"
    success: "パスワードが正常にリセットされました。新しいパスワードでログインできます。"
    error: "パスワードのリセット中にエラーが発生しました。もう一度お試しください。"

# === FORM ===
form:
  email: "メール"
  email.placeholder: "your.email@example.com"
  password: "新しいパスワード"
  password.placeholder: "新しいパスワードを入力"
  password.confirm: "パスワードの確認"
  password.confirm.placeholder: "新しいパスワードを確認"
  error:
    email:
      required: "メールは必須です"
      invalid: "無効なメールアドレス"
    password:
      required: "パスワードは必須です"
      min_length: "パスワードは{{ limit }}文字以上である必要があります"
      mismatch: "パスワードが一致しません"

# === FLASH MESSAGES ===
flash:
  success:
    generic: "操作が正常に完了しました"
    saved: "変更が正常に保存されました"
  error:
    generic: "エラーが発生しました。もう一度お試しください。"
    unauthorized: "この操作を実行する権限がありません"
    validation: "フォームのエラーを確認してください"
  info:
    processing: "リクエストを処理中です..."
  warning:
    unsaved_changes: "保存されていない変更があります。本当にページを離れますか？"
