# === RESET PASSWORD ===
reset_password:
  request:
    title: "重置密码"
    subtitle: "输入您的电子邮件地址，我们将向您发送重置密码的链接"
    help: "我们将向您发送包含重置密码说明的电子邮件"
    submit: "发送重置链接"
    back_to_login: "返回登录"

  confirm:
    title: "创建新密码"
    subtitle: "在下方输入您的新密码"
    help: "密码至少需要6个字符"
    submit: "重置密码"
    back_to_login: "返回登录"

  flash:
    request_success: "如果该邮箱对应账户存在，您将很快收到密码重置链接。"
    request_error: "处理您的请求时发生错误。请重试。"
    invalid_token: "重置令牌无效或已过期。请重新申请密码重置。"
    expired_token: "您的密码重置链接已过期。请申请新的链接。"
    success: "您的密码已成功重置。现在您可以使用新密码登录。"
    error: "重置密码时发生错误。请重试。"

# === FORM ===
form:
  email: "电子邮件"
  email.placeholder: "your.email@example.com"
  password: "新密码"
  password.placeholder: "请输入新密码"
  password.confirm: "确认密码"
  password.confirm.placeholder: "请确认新密码"
  error:
    email:
      required: "电子邮件为必填项"
      invalid: "无效的电子邮件地址"
