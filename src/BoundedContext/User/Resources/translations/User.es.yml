# === RESET PASSWORD ===
reset_password:
  request:
    title: "Restablecer contraseña"
    subtitle: "Introduce tu dirección de email y te enviaremos un enlace para restablecer tu contraseña"
    help: "Te enviaremos un email con instrucciones para restablecer tu contraseña"
