  confirm:
    title: "Crear nueva contraseña"
    subtitle: "Introduce tu nueva contraseña a continuación"
    help: "La contraseña debe tener al menos 6 caracteres"
    submit: "Restablecer contraseña"
    back_to_login: "Volver al inicio de sesión"

  flash:
    request_success: "Si existe una cuenta con ese email, recibirás un enlace para restablecer la contraseña en breve."
    request_error: "Se ha producido un error al procesar tu solicitud. Por favor, inténtalo de nuevo."
    invalid_token: "Token de restablecimiento inválido o caducado. Por favor, solicita un nuevo restablecimiento de contraseña."
    expired_token: "Tu enlace de restablecimiento de contraseña ha caducado. Por favor, solicita uno nuevo."
    success: "Tu contraseña ha sido restablecida con éxito. Ahora puedes iniciar sesión con tu nueva contraseña."
    error: "Se ha producido un error al restablecer tu contraseña. Por favor, inténtalo de nuevo."

