# === LOGIN (User login) ===
login:
  title: "Anmelden"
  subtitle: "Melden Sie sich bei Ihrem Konto an"

  form:
    username_or_email:
      label: "E-Mail oder Benutzername"
      placeholder: "E-Mail oder Benutzernamen eingeben"
    password:
      label: "Passwort"
      placeholder: "Passwort eingeben"
    submit: "Anmelden"

  flash:
    success: "Sie sind jetzt angemeldet. Willkommen zurück!"
    error: "Anmeldung fehlgeschlagen. Bitte überprüfen Sie Ihre Anmeldedaten."

  link:
    no_account: "Noch kein Konto?"
    register: "Registrieren"
    forgot_password: "Passwort vergessen?"

# === REGISTRATION (User registration) ===
registration:
  title: "Konto erstellen"
  subtitle: "Registrieren Sie sich, um unserer Community beizutreten"

  form:
    email:
      label: "E-Mail"
      placeholder: "Geben Sie Ihre E-Mail-Adresse ein"
    username:
      label: "Benutzername"
      placeholder: "magicbart"
    password:
      label: "Passwort"
      placeholder: "••••••••••••••••"
    confirm_password:
      label: "Passwort bestätigen"
      placeholder: "Passwort bestätigen"
    submit: "Konto erstellen"

  error:
    email_required: "E-Mail ist erforderlich"
    email_invalid: "Bitte geben Sie eine gültige E-Mail-Adresse ein"
    username_required: "Benutzername ist erforderlich"
    username_too_short: "Der Benutzername muss mindestens {{ limit }} Zeichen lang sein"
    username_too_long: "Der Benutzername darf maximal {{ limit }} Zeichen lang sein"
    username_invalid_format: "Der Benutzername darf nur Buchstaben, Zahlen, Unterstriche und Bindestriche enthalten"
    password_required: "Passwort ist erforderlich"
    password_too_short: "Das Passwort muss mindestens {{ limit }} Zeichen lang sein"
    password_invalid_format: "Das Passwort muss mindestens einen Buchstaben und eine Zahl enthalten"
    password_mismatch: "Die Passwortfelder müssen übereinstimmen"

  flash:
    success: "Ihr Konto wurde erfolgreich erstellt! Willkommen bei Video Games Records!"
    error: "Bei der Registrierung ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut."

  link:
    have_account: "Bereits ein Konto?"
    login: "Anmelden"

# === RESET PASSWORD (Password reset functionality) ===
reset_password:
  request:
    title: "Passwort zurücksetzen"
    subtitle: "Geben Sie Ihre E-Mail-Adresse ein und wir senden Ihnen einen Link zum Zurücksetzen Ihres Passworts"
    help: "Wir senden Ihnen eine E-Mail mit Anweisungen zum Zurücksetzen Ihres Passworts"
    submit: "Reset-Link senden"
    back_to_login: "Zurück zur Anmeldung"

  confirm:
    title: "Neues Passwort erstellen"
    subtitle: "Geben Sie Ihr neues Passwort ein"
    help: "Das Passwort muss mindestens 6 Zeichen lang sein"
    submit: "Passwort zurücksetzen"
    back_to_login: "Zurück zur Anmeldung"

  flash:
    request_success: "Wenn ein Konto mit dieser E-Mail existiert, erhalten Sie in Kürze einen Link zum Zurücksetzen des Passworts."
    request_error: "Bei der Verarbeitung Ihrer Anfrage ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut."
    invalid_token: "Ungültiger oder abgelaufener Reset-Token. Bitte fordern Sie ein neues Passwort-Reset an."
    expired_token: "Ihr Passwort-Reset-Link ist abgelaufen. Bitte fordern Sie einen neuen an."
    success: "Ihr Passwort wurde erfolgreich zurückgesetzt. Sie können sich jetzt mit Ihrem neuen Passwort anmelden."
    error: "Beim Zurücksetzen Ihres Passworts ist ein Fehler aufgetreten. Bitte versuchen Sie es erneut."

# === FORM (Commun pour les formulaires) ===
form:
  email: "E-Mail"
  email.placeholder: "ihre.email@example.com"
  password: "Neues Passwort"
  password.placeholder: "Neues Passwort eingeben"
  password.confirm: "Passwort bestätigen"
  password.confirm.placeholder: "Neues Passwort bestätigen"
  error:
    email:
      required: "E-Mail ist erforderlich"
      invalid: "Ungültige E-Mail-Adresse"
    password:
      required: "Passwort ist erforderlich"
      min_length: "Das Passwort muss mindestens {{ limit }} Zeichen lang sein"
      mismatch: "Passwörter stimmen nicht überein"

# === FLASH MESSAGES (Messages système) ===
flash:
  success:
    generic: "Vorgang erfolgreich abgeschlossen"
    saved: "Änderungen erfolgreich gespeichert"
  error:
    generic: "Ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut."
