# === PROFILE (Gestion du profil utilisateur) ===
profile:
  title:
    main: "Profileinstellungen"
    subtitle: "Verwalten Sie Ihre Kontoeinstellungen und Präferenzen"

  navigation:
    personal_info: "Persönliche Informationen"
    picture: "Profilbild"
    player: "Spielerprofil"
    password: "Passwort"

  personal_info:
    title: "Persönliche Informationen"
    description: "In diesem Bereich können Sie Ihre persönlichen Informationen aktualisieren (Benutzername, E-Mail, Sprache usw.)."
    form:
      username:
        label: "Benutzername"
        placeholder: "Geben Sie Ihren Benutzernamen ein"
      email:
        label: "E-Mail-Adresse"
        placeholder: "Geben Sie Ihre E-Mail ein"
      language:
        label: "Sprache"
        placeholder: "Sprache auswählen"
      timezone:
        label: "Zeitzone"
        placeholder: "Zeitzone auswählen"
      submit: "Änderungen speichern"
      error:
        username_required: "Benutzername ist erforderlich"
        username_too_short: "Der Benutzername muss mindestens {{ limit }} Zeichen lang sein"
        username_too_long: "Der Benutzername darf maximal {{ limit }} Zeichen lang sein"
        username_invalid_format: "Der Benutzername darf nur Buchstaben, Zahlen, Unterstriche und Bindestriche enthalten"
        email_required: "E-Mail ist erforderlich"
        email_invalid: "Bitte geben Sie eine gültige E-Mail-Adresse ein"
    message:
      success: "Ihre persönlichen Informationen wurden erfolgreich aktualisiert"
      error: "Beim Aktualisieren Ihrer Informationen ist ein Fehler aufgetreten"

  picture:
    title: "Profilbild"
    description: "In diesem Bereich können Sie Ihr Profilbild/Avatar hochladen und aktualisieren."
    current_avatar: "Aktueller Avatar"
    form:
      avatar:
        label: "Bild auswählen"
      help: "Erlaubte Formate: PNG, JPEG. Maximale Größe: 2 MB. Das Bild wird auf 100x100 Pixel skaliert."
      submit: "Hochladen"
      error:
        file_required: "Bitte wählen Sie ein Bild aus."
        mime_type: "Es sind nur PNG- und JPEG-Bilder erlaubt."
        max_size: "Die Datei ist zu groß. Maximale Größe: {{ limit }}."
    message:
      success: "Ihr Profilbild wurde erfolgreich aktualisiert"
      error: "Beim Hochladen Ihres Bildes ist ein Fehler aufgetreten"

  player:
    title: "Spielerprofil"
    description: "Dieser Bereich zeigt Ihre Spielerstatistiken, Erfolge und Spielaktivitäten."
    stats:
      total_games: "Spiele gesamt"
      total_records: "Rekorde gesamt"
      achievements: "Erfolge"
      rank: "Globaler Rang"
    message:
      no_stats: "Noch keine Statistiken verfügbar. Fangen Sie an zu spielen, um Ihren Fortschritt zu sehen!"

  password:
    title: "Passwort ändern"
    subtitle: "Das Passwort muss mindestens 8 Zeichen mit Buchstaben und Zahlen enthalten"
    form:
      current_password:
        label: "Aktuelles Passwort"
        placeholder: "Aktuelles Passwort eingeben"
      new_password:
        label: "Neues Passwort"
        placeholder: "Neues Passwort eingeben"
      confirm_password:
        label: "Neues Passwort bestätigen"
        placeholder: "Neues Passwort bestätigen"
      submit: "Passwort ändern"
    error:
      current_required: "Bitte geben Sie Ihr aktuelles Passwort ein"
      current_invalid: "Falscher Wert für Ihr aktuelles Passwort"
      new_required: "Bitte geben Sie ein neues Passwort ein"
      new_too_short: "Ihr Passwort muss mindestens {{ limit }} Zeichen lang sein"
      new_invalid_format: "Das Passwort muss mindestens 8 Zeichen mit Buchstaben und Zahlen enthalten"
      mismatch: "Die Passwortfelder müssen übereinstimmen."
    message:
      success: "Ihr Passwort wurde erfolgreich geändert"
      error: "Beim Ändern Ihres Passworts ist ein Fehler aufgetreten"

