# === LOGIN (User login) ===
login:
  title: "Connexion"
  subtitle: "Connectez-vous à votre compte"

  # Formulaire de connexion
  form:
    username_or_email:
      label: "Email ou Username"
      placeholder: "Entrez votre email ou nom d'utilisateur"
    password:
      label: "Mot de passe"
      placeholder: "Entrez votre mot de passe"
    submit: "Se connecter"

  # Messages flash
  flash:
    success: "Vous êtes maintenant connecté. Bon retour !"
    error: "Échec de la connexion. Veuillez vérifier vos identifiants."

  # Liens
  link:
    no_account: "Vous n'avez pas de compte ?"
    register: "S'inscrire"
    forgot_password: "Mot de passe oublié ?"

# === REGISTRATION (User registration) ===
registration:
  title: "Créer un compte"
  subtitle: "Inscrivez-vous pour rejoindre notre communauté"

  # Formulaire d'inscription
  form:
    email:
      label: "Email"
      placeholder: "Entrez votre adresse email"
    username:
      label: "Nom d'utilisateur"
      placeholder: "magicbart"
    password:
      label: "Mot de passe"
      placeholder: "••••••••••••••••"
    confirm_password:
      label: "Confirmer le mot de passe"
      placeholder: "Confirmez votre mot de passe"
    submit: "Créer un compte"

  # Messages d'erreur
  error:
    email_required: "L'email est requis"
    email_invalid: "Veuillez entrer une adresse email valide"
    username_required: "Le nom d'utilisateur est requis"
    username_too_short: "Le nom d'utilisateur doit contenir au moins {{ limit }} caractères"
    username_too_long: "Le nom d'utilisateur ne peut pas dépasser {{ limit }} caractères"
    username_invalid_format: "Le nom d'utilisateur ne peut contenir que des lettres, des chiffres, des underscores et des tirets"
    password_required: "Le mot de passe est requis"
    password_too_short: "Le mot de passe doit contenir au moins {{ limit }} caractères"
    password_invalid_format: "Le mot de passe doit contenir au moins une lettre et un chiffre"
    password_mismatch: "Les champs de mot de passe doivent correspondre"

  # Messages flash
  flash:
    success: "Votre compte a été créé avec succès ! Bienvenue sur Video Games Records !"
    error: "Une erreur s'est produite lors de l'inscription. Veuillez réessayer."

  # Liens
  link:
    have_account: "Vous avez déjà un compte ?"
    login: "Connexion"

# === RESET PASSWORD (Réinitialisation du mot de passe) ===
reset_password:
  # Page de demande de réinitialisation
  request:
    title: "Réinitialiser le mot de passe"
    subtitle: "Saisissez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe"
    help: "Nous vous enverrons un email avec les instructions pour réinitialiser votre mot de passe"
    submit: "Envoyer le lien de réinitialisation"
    back_to_login: "Retour à la connexion"

  # Page de confirmation/création du nouveau mot de passe
  confirm:
    title: "Créer un nouveau mot de passe"
    subtitle: "Saisissez votre nouveau mot de passe ci-dessous"
    help: "Le mot de passe doit contenir au moins 6 caractères"
    submit: "Réinitialiser le mot de passe"
    back_to_login: "Retour à la connexion"

  # Messages flash
  flash:
    request_success: "Si un compte avec cet email existe, vous recevrez un lien de réinitialisation sous peu."
    request_error: "Une erreur s'est produite lors du traitement de votre demande. Veuillez réessayer."
    invalid_token: "Jeton de réinitialisation invalide ou expiré. Veuillez demander une nouvelle réinitialisation de mot de passe."
    expired_token: "Votre lien de réinitialisation de mot de passe a expiré. Veuillez en demander un nouveau."
    success: "Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe."
    error: "Une erreur s'est produite lors de la réinitialisation de votre mot de passe. Veuillez réessayer."

# === FORM (Commun pour les formulaires) ===
form:
  email: "Email"
  email.placeholder: "votre.email@example.com"
