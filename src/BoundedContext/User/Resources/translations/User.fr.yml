    validation: "Veuillez vérifier le formulaire pour les erreurs"
  info:
    processing: "Votre demande est en cours de traitement..."
  warning:
    unsaved_changes: "Vous avez des modifications non enregistrées. Êtes-vous sûr de vouloir partir ?"