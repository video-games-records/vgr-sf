# ========================================
# STRATÉGIE DE TRADUCTION - User Context
# ========================================
#
# STRUCTURE HIÉRARCHIQUE :
# - Niveau 1 : Domaine fonctionnel (profile, account, security)
# - Niveau 2 : Type de contenu (navigation, form, message, title, action)
# - Niveau 3 : Clé spécifique
#
# CONVENTIONS DE NOMMAGE :
# - snake_case pour les clés
# - Éviter les répétitions (ex: profile.form.password au lieu de profile.password_form.password)
# - Regrouper les éléments similaires (labels, placeholders, errors ensemble)
#
# AVANTAGES :
# ✓ Réutilisable : clés communes partagées
# ✓ Maintenable : structure prévisible
# ✓ Scalable : facile à étendre
# ✓ DRY : évite les duplications
#
# ========================================

# === COMMUN (Réutilisable dans tout le contexte User) ===
common:
  close: "Fermer"
  save: "Enregistrer"
  cancel: "Annuler"
  submit: "Soumettre"
  delete: "Supprimer"
  edit: "Modifier"
  back: "Retour"
  confirm: "Confirmer"

# === PROFILE (Gestion du profil utilisateur) ===
profile:
  # Titres et en-têtes généraux
  title:
    main: "Paramètres du profil"
    subtitle: "Gérez les paramètres et préférences de votre compte"

  # Navigation entre les sections du profil
  navigation:
    personal_info: "Informations personnelles"
    picture: "Photo de profil"
    player: "Profil joueur"
    password: "Mot de passe"

  # Section : Informations personnelles
  personal_info:
    title: "Informations personnelles"
    description: "Cette section vous permettra de mettre à jour vos informations personnelles (nom d'utilisateur, email, langue, etc.)."
    form:
      username:
        label: "Nom d'utilisateur"
        placeholder: "Entrez votre nom d'utilisateur"
      email:
        label: "Adresse email"
        placeholder: "Entrez votre email"
      language:
        label: "Langue"
        placeholder: "Sélectionnez votre langue"
      timezone:
        label: "Fuseau horaire"
        placeholder: "Sélectionnez votre fuseau horaire"
      submit: "Enregistrer"
      error:
        username_required: "Le nom d'utilisateur est requis"
        username_too_short: "Le nom d'utilisateur doit comporter au moins {{ limit }} caractères"
        username_too_long: "Le nom d'utilisateur ne peut pas dépasser {{ limit }} caractères"
        username_invalid_format: "Le nom d'utilisateur ne peut contenir que des lettres, chiffres, tirets et underscores"
        email_required: "L'email est requis"
        email_invalid: "Veuillez entrer une adresse email valide"
    message:
      success: "Vos informations personnelles ont été mises à jour avec succès"
      error: "Une erreur s'est produite lors de la mise à jour de vos informations"

  # Section : Photo de profil
  picture:
    title: "Photo de profil"
    description: "Cette section vous permettra de télécharger et mettre à jour votre photo de profil/avatar."
    current_avatar: "Avatar actuel"
    form:
      avatar:
        label: "Choisir une image"
      help: "Formats autorisés : PNG, JPEG. Taille maximale : 2 Mo. L'image sera redimensionnée en 100x100 pixels."
      submit: "Envoyer"
      error:
        file_required: "Veuillez sélectionner une image."
        mime_type: "Seules les images PNG et JPEG sont autorisées."
        max_size: "Le fichier est trop volumineux. Taille maximale : {{ limit }}."
    message:
      success: "Votre photo de profil a été mise à jour avec succès"
      error: "Une erreur s'est produite lors du téléchargement de votre photo"

  # Section : Profil joueur
  player:
    title: "Profil joueur"
    description: "Cette section affichera vos statistiques de joueur, vos succès et votre activité de jeu."
    stats:
      total_games: "Jeux totaux"
      total_records: "Records totaux"
      achievements: "Succès"
      rank: "Rang mondial"
    message:
      no_stats: "Aucune statistique disponible pour le moment. Commencez à jouer pour voir votre progression !"

  # Section : Mot de passe
  password:
    title: "Changer votre mot de passe"
    subtitle: "Le mot de passe doit contenir au moins 8 caractères avec des lettres et des chiffres"
    form:
      current_password:
        label: "Mot de passe actuel"
        placeholder: "Entrez votre mot de passe actuel"
      new_password:
        label: "Nouveau mot de passe"
        placeholder: "Entrez votre nouveau mot de passe"
      confirm_password:
        label: "Confirmer le nouveau mot de passe"
        placeholder: "Confirmez votre nouveau mot de passe"
      submit: "Changer le mot de passe"
    error:
      current_required: "Veuillez entrer votre mot de passe actuel"
      current_invalid: "Valeur incorrecte pour votre mot de passe actuel"
      new_required: "Veuillez entrer un nouveau mot de passe"
      new_too_short: "Votre mot de passe doit contenir au moins {{ limit }} caractères"
      new_invalid_format: "Le mot de passe doit contenir au moins 8 caractères avec des lettres et des chiffres"
      mismatch: "Les champs de mot de passe doivent correspondre."
    message:
      success: "Votre mot de passe a été changé avec succès"
      error: "Une erreur s'est produite lors du changement de votre mot de passe"

