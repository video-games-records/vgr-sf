name: Deploy

on:
    schedule:
        - cron: '0 7 * * *'   # 09h00 Paris (heure d'été)
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment'
                required: true
                default: 'staging'
                type: choice
                options:
                    - staging
                    - production

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment || 'staging' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 10

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'

            - name: Install PHP dependencies
              run: APP_ENV=prod composer install --no-dev --optimize-autoloader

            - name: Security audit
              run: composer audit

            - uses: actions/setup-node@v4
              with:
                  node-version: 'lts/*'

            - name: Build assets
              run: npm install && npm run build

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
                  eval $(ssh-agent -a /tmp/ssh_agent.sock)
                  ssh-add ~/.ssh/id_ed25519
              env:
                  SSH_AUTH_SOCK: /tmp/ssh_agent.sock

            - name: Prepare robots.txt
              run: cp public/robots.${{ inputs.environment || 'staging' }}.txt public/robots.txt

            - name: Deploy
              env:
                  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
              run: |
                  rsync -azv --delete \
                    -e "ssh -p ${{ secrets.SSH_PORT }}" \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='var/' \
                    --exclude='.env.local' \
                    ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
                  ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                    "cd ${{ secrets.DEPLOY_PATH }} && php bin/console cache:clear && php bin/console cache:warmup"

            - name: Compile assets (production only)
              if: ${{ (inputs.environment || 'staging') == 'production' }}
              env:
                  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
              run: |
                  ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                    "cd ${{ secrets.DEPLOY_PATH }} && php bin/console asset-map:compile"

            - name: Notify Discord
              if: always() && (inputs.environment || 'staging') == 'production'
              run: |
                  STATUS="${{ job.status }}"
                  if [ "$STATUS" = "success" ]; then
                    HEADER="🚀 **VGR deployed to production!**"
                  else
                    HEADER="❌ **VGR deployment FAILED!**"
                  fi
                  COMMITS=$(git log --oneline -10 --pretty=format:"• \`%h\` %s" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
                  MSG="${HEADER}\n\n**Last 10 commits:**\n${COMMITS}"
                  curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                    -H "Content-Type: application/json" \
                    -d "{\"content\": \"$MSG\"}"
