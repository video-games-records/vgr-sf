sonata_admin:
    assets:
        extra_stylesheets:
            - bundles/sonatatranslation/css/sonata-translation.css

sonata_block:
    blocks:
        sonata_translation.block.locale_switcher: null

sonata_translation:
    locales: ['en', 'fr', 'de', 'it', 'ja', 'es', 'pt_BR', 'zh_CN']
    default_locale: 'en'
    locale_switcher: true
