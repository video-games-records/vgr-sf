framework:
    html_sanitizer:
        sanitizers:
            app.content_sanitizer:
                allow_safe_elements: false
                allow_elements:
                    p: []
                    br: []
                    strong: []
                    em: []
                    u: []
                    ol: []
                    ul: []
                    li: []
                    a: ['href']
                    h1: []
                    h2: []
                    h3: []
                    blockquote: []
