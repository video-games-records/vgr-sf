security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            id: App\BoundedContext\User\Infrastructure\Security\UserProvider

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        audit:
            lazy: true
            pattern: /audit(.*)
            provider: app_user_provider
            context: user

        admin:
            lazy: true
            pattern: /admin(.*)
            provider: app_user_provider
            context: user
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: sonata_admin_dashboard
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 2629746
                path: /admin
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

        api:
            pattern: ^/api
            stateless: true
            entry_point: jwt
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~
            #refresh_jwt:
            #    check_path: /api/token/refresh # or, you may use the `api_refresh_token` route name
            login_throttling:
                max_attempts: 10
                interval: '15 minutes'

        main:
            lazy: true
            provider: app_user_provider
            context: user
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: /
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%env(APP_SECRET)%'
                lifetime: 2629746
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/(login|token/refresh), roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logs, roles: ROLE_SUPER_ADMIN }
        - { path: ^/admin/messenger, roles: [ ROLE_MESSENGER_MONITOR ] }
        - { path: ^/admin/, roles: [ ROLE_ADMIN, ROLE_SONATA_ADMIN ] }
        - { path: ^/audit/, roles: [ ROLE_ADMIN, ROLE_SONATA_ADMIN ] }

    role_hierarchy:
        ROLE_ADMIN: [ ROLE_USER, ROLE_SONATA_ADMIN ]
        ROLE_SUPER_ADMIN: [ ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH, ROLE_MESSENGER_MONITOR ]

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
